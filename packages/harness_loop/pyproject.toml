[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "harness-loop"
version = "0.1.0a2"
description = "Harness Loop (Alpha) — offline evolution companion to harness-core (harvest/promote/adopt/eval)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "hihewh-byte" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
harness-loop = "harness_loop.cli:main"

[project.urls]
Homepage = "https://github.com/hihewh-byte/personal_health_agent"
Documentation = "https://github.com/hihewh-byte/personal_health_agent/blob/main/packages/harness_loop/README.md"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
