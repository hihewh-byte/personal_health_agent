name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Consensus gates need merge-base vs origin/main; depth=1 breaks HEAD~1 fallback.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -e .
          pip install -e packages/harness_core
          pip install -e packages/harness_loop

      - name: Clone bootstrap (golden run)
        run: PHA_PYTHON=python bash scripts/bootstrap.sh --skip-venv --verify-only

      - name: Doctor (offline — Ollama expected to fail)
        run: python scripts/doctor.py --quick || true

      - name: Offline selfcheck suite
        run: bash scripts/run_selfchecks.sh

      - name: Harness profile registry manifest (P2)
        run: PYTHONPATH=. python scripts/pha_harness_profile_registry_generate.py --check

      - name: Startup consensus gate
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python scripts/ci/check_startup_consensus.py

      - name: Harness consensus gate
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python scripts/ci/check_harness_consensus.py

      - name: Import smoke test
        run: PYTHONPATH=. python -c "from pha.main import create_app; create_app()"
